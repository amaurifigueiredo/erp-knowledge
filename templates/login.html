{% extends "base.html" %}

{% block content %}
<h2>Login</h2>
<form method="POST">
    <input name="usuario" class="form-control mb-2" placeholder="Usuário" required>
    <input name="senha" type="password" class="form-control mb-2" placeholder="Senha" required>
    <button class="btn btn-primary">Entrar</button>
</form>
{% if erro %}
    <div class="alert alert-danger mt-2">{{ erro }}</div>
{% endif %}
{% endblock %}
