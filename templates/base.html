<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Knowledge Base</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">ERP Knowledge</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('adicionar') }}">Adicionar Conhecimento</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('listar_usuarios') }}">Usuários</a></li>
            </ul>
            {% if session.get('usuario') %}
                <span class="navbar-text text-light me-3">Olá, {{ session['usuario'] }}</span>
                <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Sair</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
