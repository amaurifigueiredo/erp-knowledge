{% extends "base.html" %}

{% block content %}
<h2>Usuários</h2>
<a class="btn btn-success mb-2" href="{{ url_for('adicionar_usuario') }}">Adicionar Usuário</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Usuário</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
